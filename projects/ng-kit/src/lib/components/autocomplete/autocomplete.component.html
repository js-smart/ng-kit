<mat-form-field [appearance]="appearance()" [class]="classes()">
	<mat-label>{{ label() }}</mat-label>
	<input
		#inputAutoComplete
		#trigger="matAutocompleteTrigger"
		[formControl]="control"
		[matAutocomplete]="auto"
		[placeholder]="placeHolder()"
		[required]="required()"
		matInput
		type="text" />

	<div matSuffix style="display: flex">
		<button
			(click)="clearInput($event)"
			[style.visibility]="control.value ? 'visible' : 'hidden'"
			aria-label="Clear"
			mat-icon-button
			type="button">
			<mat-icon>clear</mat-icon>
		</button>
		<button (click)="openOrClosePanel($event, trigger)" aria-label="Toggle dropdown" mat-icon-button type="button">
			<mat-icon>{{ arrowIcon() }}</mat-icon>
		</button>
	</div>

	<mat-autocomplete
		#auto="matAutocomplete"
		(closed)="onPanelClosed()"
		(opened)="onPanelOpened()"
		(optionSelected)="onPanelClosed()"
		[displayWith]="displayFn">
		@for (option of filteredOptions | async; track option[bindValue()]) {
			<mat-option (onSelectionChange)="emitSelectedValue($event)" [value]="option">
				@if (typeof option === 'string') {
					<ng-container>{{ option }}</ng-container>
				} @else if (typeof option === 'object') {
					<ng-container>{{ option[bindLabel()] }}</ng-container>
				}
			</mat-option>
		}
	</mat-autocomplete>
</mat-form-field>
