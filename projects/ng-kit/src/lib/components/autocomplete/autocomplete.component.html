<mat-form-field
	#origin="matAutocompleteOrigin"
	[appearance]="appearance()"
	[ngClass]="classes()"
	class="autocomplete-width"
	matAutocompleteOrigin
	subscriptSizing="dynamic">
	<mat-label>{{ label() }}</mat-label>

	<input
		#inputEl
		#trigger="matAutocompleteTrigger"
		(click)="trigger.openPanel()"
		(input)="onInput($event)"
		[formControl]="control"
		[matAutocompleteConnectedTo]="origin"
		[matAutocomplete]="auto"
		[placeholder]="placeholder()"
		matInput
		type="text" />

	<div matSuffix style="display: flex; align-items: center">
		@if (control.value) {
			<button (click)="clearInput($event)" mat-icon-button>
				<mat-icon>close</mat-icon>
			</button>
		}
		@if (isExpanded()) {
			<mat-icon>arrow_drop_up</mat-icon>
		} @else {
			<mat-icon>arrow_drop_down</mat-icon>
		}
	</div>

	<mat-autocomplete
		#auto="matAutocomplete"
		(closed)="isExpanded.set(false)"
		(opened)="isExpanded.set(true)"
		(optionSelected)="onOptionSelected($event.option.value)"
		[displayWith]="displayFn">
		@if (loading()) {
			<mat-option disabled>
				<div style="display: flex; align-items: center; gap: 8px">
					<mat-spinner diameter="20"></mat-spinner>
					<span>{{ loadingText() }}</span>
				</div>
			</mat-option>
		} @else {
			@for (option of filteredOptions(); track option) {
				<mat-option [value]="option">{{ displayWith()(option) }}</mat-option>
			} @empty {
				<mat-option disabled>{{ noOptionsText() }}</mat-option>
			}
		}
	</mat-autocomplete>
</mat-form-field>
