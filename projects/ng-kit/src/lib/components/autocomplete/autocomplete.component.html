<mat-form-field
	#origin="matAutocompleteOrigin"
	[appearance]="appearance()"
	[ngClass]="classes()"
	matAutocompleteOrigin
	subscriptSizing="dynamic">
	<mat-label>{{ label() }}</mat-label>

	<input
		#inputEl
		#trigger="matAutocompleteTrigger"
		(click)="trigger.openPanel()"
		(input)="onInput($event)"
		[formControl]="control"
		[matAutocompleteConnectedTo]="origin"
		[matAutocomplete]="auto"
		[placeholder]="placeholder()"
		matInput
		type="text" />

	<div class="autocomplete-suffix" matSuffix>
		@if (control.value) {
			<button type="button" (click)="clearInput($event)" class="suffix-action-btn" mat-icon-button>
				<mat-icon>close</mat-icon>
			</button>
		} @else {
			<span aria-hidden="true" class="suffix-placeholder"></span>
		}
		<button
			(click)="trigger.panelOpen ? trigger.closePanel() : trigger.openPanel(); $event.stopPropagation()"
			[attr.aria-label]="trigger.panelOpen ? 'Close options' : 'Open options'"
			class="suffix-action-btn"
			mat-icon-button
			type="button">
			@if (isExpanded()) {
				<mat-icon>arrow_drop_up</mat-icon>
			} @else {
				<mat-icon>arrow_drop_down</mat-icon>
			}
		</button>
	</div>

	<mat-autocomplete
		#auto="matAutocomplete"
		(closed)="isExpanded.set(false)"
		(opened)="onPanelOpened()"
		(optionSelected)="onOptionSelected($event.option.value)"
		[displayWith]="displayFn">
		@if (loading()) {
			<mat-option disabled>
				<div style="display: flex; align-items: center; gap: 8px">
					<mat-spinner diameter="20"></mat-spinner>
					<span>{{ loadingText() }}</span>
				</div>
			</mat-option>
		} @else {
			@for (option of filteredOptions(); track option) {
				<mat-option [value]="option">{{ displayWith()(option) }}</mat-option>
			} @empty {
				<mat-option disabled>{{ noOptionsText() }}</mat-option>
			}
		}
	</mat-autocomplete>
</mat-form-field>
