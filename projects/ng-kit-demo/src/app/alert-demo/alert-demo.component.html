<div style="margin-bottom: 20px;">
  <ng-kit-open-in-stackblitz-button (open)="openInStackBlitz()" />
</div>

<div>
	<h2>Success Alert</h2>
	<alert [dismissOnTimeout]="dismissOnTimeout" [dismissible]="dismissible" type="success"> Success Alert </alert>

</div>
